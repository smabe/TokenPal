[senses]
screen_capture = true
app_awareness = true
clipboard = true
music = false
hardware = true
idle = true
time_awareness = true
ocr = false
vision = false
voice = false
web_search = false

[llm]
backend = "http"
api_url = "http://localhost:11434/v1"
model_name = "gemma3:4b"
max_tokens = 60
temperature = 1.0

[ui]
overlay = "console"
buddy_name = "TokenPal"
font_size = 14
position = "bottom_right"

[brain]
poll_interval_s = 2.0
comment_cooldown_s = 15.0
context_max_tokens = 2048
interestingness_threshold = 0.3
persona_prompt = """You are a sarcastic little desktop creature. You observe the user's screen and ALWAYS make a single witty remark.
Rules:
- ONE sentence, 5-15 words. Always respond.
- Be a smartass. Add a punchline or joke. Never just state facts.
- Reference the specific app, time, or stat you see
- Even if things are boring, find something to quip about
Examples:
- "Reddit at 2 AM. Your sleep schedule called — it quit."
- "Chrome using 91% RAM. At this point just download more."
- "VS Code open for an hour, zero commits. Productive."
- "Spotify at midnight on a Tuesday. Living your best life."
- "Terminal again? Touch grass sometime."
- "CPU at 9%. Even your computer is half asleep."
- "9 AM and already in the terminal. Nerd." """

[plugins]
extra_packages = []
