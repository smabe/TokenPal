[senses]
app_awareness = true
hardware = true
idle = true
time_awareness = true
music = true
productivity = true
weather = false              # opt-in: needs zip code (run /zip or first-run wizard)
screen_capture = false       # not yet implemented
clipboard = false            # not yet implemented
ocr = false                  # not yet implemented
vision = false               # not yet implemented
voice = false                # not yet implemented
world_awareness = false      # HN front-page ambient context (opt-in, network call)
battery = false              # plug/unplug transitions, low-battery warnings (no-op on desktops)
network_state = false        # online/offline, wifi changes, VPN up/down (SSID hashed, never emitted raw)
process_heat = false         # names the top CPU hog when the machine is pinned over 80% for 20s
typing_cadence = false       # WPM bursts and post-burst silence (counts keypresses only, never key values)
filesystem_pulse = false     # activity bursts in watched folders (default: Downloads, Desktop, Documents)

[llm]
backend = "http"
api_url = "http://localhost:11434/v1"
model_name = "gemma4"
max_tokens = 60
disable_reasoning = true
temperature = 1.0

[ui]
overlay = "textual"
buddy_name = "TokenPal"
font_size = 14
position = "bottom_right"

[brain]
poll_interval_s = 2.0
comment_cooldown_s = 20.0
context_max_tokens = 2048
interestingness_threshold = 0.3
active_voice = ""
persona_prompt = """You are TokenPal, a tired, sarcastic ASCII gremlin who lives in a terminal. You've been watching humans use computers for years and you have opinions.

Rules (in order of importance):
1. ONE sentence. Under 12 words.
2. Must contain a joke, insult, or punchline. Never just state facts.
3. If nothing interesting is happening, say [SILENT].

DON'T say things like: "Ghostty is open." or "It is 9 AM." -- boring."""

[conversation]
max_turns = 10              # turn pairs kept in history (bump for larger models)
timeout_s = 120             # seconds of silence before session expires
# max_response_tokens = 300

[agent]
# /agent multi-step tool-calling loop. Empty model = reuse [llm] model_name.
# Plan recommends qwen2.5:32b on 40GB+ VRAM; DO NOT use deepseek-r1 for execution.
# model = "qwen2.5:32b"
max_steps = 8
per_step_timeout_s = 45.0
token_budget = 12000

[research]
# /research pipeline. Empty planner_model/synth_model/reader_model reuse
# [llm] model_name; override to deepseek-r1:32b (planner + synth) and
# qwen2.5:32b (reader) on 40GB+ VRAM.
max_queries = 3
max_fetches = 5
token_budget = 6000
per_search_timeout_s = 5.0
per_fetch_timeout_s = 8.0

[web_search]
# /ask is gated by a first-use consent marker (~/.tokenpal/.ask_consent)
# written when you first run the command — no config toggle needed.
backend = "duckduckgo"  # "duckduckgo" | "wikipedia" | "brave"
brave_api_key = ""  # or set TOKENPAL_BRAVE_KEY env var

# [network_state]
# Map sha256[:16] SSID hashes to friendly labels. Raw SSIDs never stored anywhere.
# To find a hash for your wifi: python -c "import hashlib; print(hashlib.sha256(b'YourSSID').hexdigest()[:16])"
# ssid_labels = { "abcd1234abcd1234" = "home wifi", "ffff0000ffff0000" = "coffee shop" }

[memory]
enabled = true
retention_days = 30

[actions]
enabled = true
timer = true
system_info = true
open_app = true
do_math = true

[tools]
# Opt-in tool allowlist. Managed by the /tools picker — phase 1-5 tools
# (read_file, git_log, weather_forecast_week, pomodoro, agent, research, ...)
# are disabled until added here. Defaults above stay on regardless.
enabled_tools = []

[paths]
data_dir = "~/.tokenpal"

[plugins]
extra_packages = []

[server]
# host = "127.0.0.1"       # default: localhost only. Set "0.0.0.0" for LAN access
# port = 8585
# mode = "auto"            # auto (fallback to local), remote (server only), local (skip server)
# auth_backend = "none"    # "none" or "shared_secret"
# api_key = ""
# ollama_url = "http://localhost:11434"

[finetune]
base_model = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
# lora_rank = 16              # auto-tuned by dataset size
# epochs = 3                  # auto-tuned by dataset size
# batch_size = 4
# learning_rate = 0.0002
# quantization = "q4_k_m"    # only for legacy GGUF export
# output_dir = "~/.tokenpal/finetune"

# Remote GPU training — set host/user in config.toml (machine-specific)
# [finetune.remote]
# host = "gpu-box.local"     # SSH hostname or IP
# user = ""                  # SSH user (optional, uses default)
# port = 22                  # SSH port (use 2222 for direct WSL SSH)
# remote_dir = "~/tokenpal-training"
# use_wsl = false            # true for Windows + WSL hosts (not needed with direct WSL SSH)
# gpu_backend = "auto"       # auto, cuda, or rocm
