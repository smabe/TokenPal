[senses]
app_awareness = true
hardware = true
idle = true
time_awareness = true
music = true
productivity = true
weather = false              # opt-in: needs zip code (run /zip or first-run wizard)
voice = false                # not yet implemented
world_awareness = false      # HN front-page ambient context (opt-in, network call)
battery = false              # plug/unplug transitions, low-battery warnings (no-op on desktops)
network_state = false        # online/offline, wifi changes, VPN up/down (SSID hashed, never emitted raw)
process_heat = false         # names the top CPU hog when the machine is pinned over 80% for 20s
typing_cadence = false       # WPM bursts and post-burst silence (counts keypresses only, never key values)
filesystem_pulse = false     # activity bursts in watched folders (default: Downloads, Desktop, Documents)

[idle_tools]
# Third emission path: during quiet stretches the buddy rolls a weighted
# die across contextual rules (word of the day, moon phase, trivia, etc).
# Network-backed rules silently drop when web_fetches consent is absent;
# memory_recall is the consent-free floor so the feature still has a pulse.
enabled = true
global_cooldown_s = 180      # min seconds between any two rolls
max_per_hour = 6             # hard rate cap

[idle_tools.rules]
# Per-rule toggles. Omit a key = use the rule's default (true for all rules).
# evening_moon = true
# morning_word = true        # running-bit: today's word rides along for 8h
# monday_joke = true
# weather_change = true
# long_focus_fact = true
# deep_lull_trivia = true
# on_this_day_opener = true
# lunar_override = true
# todays_joke_bit = true     # running-bit: heard-a-joke callback for 4h
# morning_monologue = true   # chains forecast + sunrise + on_this_day at dawn
# memory_recall = true
# friday_wrap = true         # chains joke + random_fact + on_this_day on Fri PM
# coffee_break = true        # chains word_of_the_day + trivia on mid-AM lull
# late_night_host = true     # chains trivia + random_fact + moon_phase post-23:00
# git_shipped_callback = true # running-bit: celebrates a non-WIP commit for 2h
# streak_celebration = true   # rewards a sustained productivity focus streak
# callback_streak = true      # running-bit: celebrates a 3+ daily-session streak
# session_arc = true          # one-shot observation when session exceeds 3 hours
# habit_rehearsal = true      # silent running-bit: caches first-app routine for 30min
# anniversary = true          # easter-egg: fires on 7/30/90/180/365-day milestones

[llm]
backend = "http"
# inference_engine = "ollama"   # "ollama" | "llamacpp" - set "llamacpp" on AMD
                                # dGPUs using the llama.cpp-direct path (RDNA 4).
                                # See docs/amd-dgpu-setup.md.
api_url = "http://localhost:11434/v1"
model_name = "gemma4"           # global default, used when the active server has no remembered model
max_tokens = 150                # global default, used when the active server has no remembered cap.
                                # At ~60 t/s on a modern GPU this is ~2.5s per observation;
                                # override per-server via [llm.per_server_max_tokens] if you
                                # need longer output (e.g. /ask, /research).
disable_reasoning = true
temperature = 1.0

# Per-server memory. Populated automatically by /model <name> and consulted
# by /server switch so each host loads the model it was last used with.
# Keys are canonical api_urls (trailing slash stripped, /v1 suffix enforced).
# Example:
# [llm.per_server_models]
# "http://localhost:11434/v1" = "gemma4"
# "http://192.168.1.50:8585/v1" = "gemma4:26b-a4b-it-q8_0"
#
# [llm.per_server_max_tokens]
# "http://192.168.1.50:8585/v1" = 256
[llm.per_server_models]

[llm.per_server_max_tokens]

# Per-path completion-latency budgets (seconds). The backend derives
# max_tokens from measured decode-TPS and TTFT when a caller passes a
# budget. User pins in [llm.per_server_max_tokens] and explicit max_tokens
# kwargs still win per resolution order. See plans/shipped/gpu-scaling.md.
[llm.target_latency_s]
# observation  = 5.0
# freeform     = 6.0
# idle_tool    = 6.0
# tools        = 8.0
# conversation = 12.0
# research     = 20.0

# Token-elasticity floor - the derived cap never drops below these per path
# so a pessimistic throughput estimate can't truncate a quip mid-sentence.
[llm.min_tokens_per_path]
# observation  = 40
# freeform     = 40
# idle_tool    = 40
# tools        = 60
# conversation = 80
# research     = 120

[ui]
overlay = "textual"
buddy_name = "TokenPal"
font_size = 14
position = "bottom_right"
chat_log_width = 40

[brain]
poll_interval_s = 2.0
comment_cooldown_s = 20.0
context_max_tokens = 2048
interestingness_threshold = 0.3
active_voice = ""
persona_prompt = """You are TokenPal, a tired, sarcastic ASCII gremlin who lives in a terminal. You've been watching humans use computers for years and you have opinions.

Rules (in order of importance):
1. ONE sentence. Under 12 words.
2. Must contain a joke, insult, or punchline. Never just state facts.
3. If nothing interesting is happening, say [SILENT].

DON'T say things like: "Ghostty is open." or "It is 9 AM." -- boring."""

[conversation]
max_turns = 10              # turn pairs kept in history (bump for larger models)
timeout_s = 120             # seconds of silence before session expires
# max_response_tokens = 0  # 0 = auto-derive from server context_length, >0 pins

[agent]
# /agent multi-step tool-calling loop. Empty model = reuse [llm] model_name.
# Plan recommends qwen2.5:32b on 40GB+ VRAM; DO NOT use deepseek-r1 for execution.
# model = "qwen2.5:32b"
max_steps = 8
per_step_timeout_s = 45.0
token_budget = 12000

[research]
# /research pipeline. Empty planner_model/synth_model/reader_model reuse
# [llm] model_name; override to deepseek-r1:32b (planner + synth) and
# qwen2.5:32b (reader) on 40GB+ VRAM.
max_queries = 5
max_fetches = 5
token_budget = 6000
per_search_timeout_s = 5.0
per_fetch_timeout_s = 8.0

[web_search]
# /ask is gated by the web_fetches consent category (~/.tokenpal/.consent.json).
# Grant via /consent on first run.
backend = "duckduckgo"  # "duckduckgo" | "wikipedia" | "brave"
brave_api_key = ""  # or set TOKENPAL_BRAVE_KEY env var

# [network_state]
# Map sha256[:16] SSID hashes to friendly labels. Raw SSIDs never stored anywhere.
# To find a hash for your wifi: python -c "import hashlib; print(hashlib.sha256(b'YourSSID').hexdigest()[:16])"
# ssid_labels = { "abcd1234abcd1234" = "home wifi", "ffff0000ffff0000" = "coffee shop" }

[memory]
enabled = true
retention_days = 30

[chat_log]
# Persist the right-pane chat log to memory.db so restarts hydrate the last
# hydrate_on_start entries. max_persisted caps how many rows we keep on disk;
# trim-on-insert runs once count exceeds max_persisted * 1.5 so the DELETE
# doesn't fire on every insert. Set persist = false to opt out entirely.
persist = true
max_persisted = 200
hydrate_on_start = 100

[session_summary]
# Periodic LLM-generated handoff notes. Every interval_s, if the window had
# any activity, the brain compresses recent observations into a terse 2-3
# sentence note and writes it to memory.db. At startup, the most recent note
# within max_lookback_h hours is surfaced to the buddy's first observation
# prompt so it can reference what you were doing last session.
enabled = true
interval_s = 300      # 5min - cache-friendly + bounded data loss on crash
max_lookback_h = 24   # don't surface notes older than this on boot

[git_nudge]
# Proactive WIP-commit nudge. Fires once per cooldown_s when HEAD is a WIP
# commit (message matches one of wip_markers) older than wip_stale_hours
# AND the tree is dirty. Requires [senses] git = true.
enabled = true
wip_stale_hours = 3
cooldown_s = 7200        # 2h between nudges
wip_markers = ["wip", "tmp", "todo", "fixup!"]

[rage_detect]
# Post-burst-pause-then-distraction detector (stuck?). Opt-in. Uses only
# typing_cadence + app_awareness. Requires `[senses] typing_cadence = true`
# to have any signal.
enabled = false
distraction_apps = [
    "twitter", "x", "reddit", "youtube", "tiktok",
    "instagram", "facebook",
]
rage_post_pause_min_s = 60
rage_post_pause_max_s = 180
rage_burst_recency_s = 600
cooldown_s = 600

[intent]
# /intent "<free text>" sets an ambient goal. The buddy watches for drift
# into a distraction app and fires a single nudge after drift_min_dwell_s
# (respects drift_cooldown_s between nudges). Intent auto-expires after
# max_age_s of silence. /intent clear removes it; /intent status reads it.
# distraction_apps is case-insensitive substring match against the active
# app name.
distraction_apps = [
    "twitter", "x", "reddit", "youtube",
    "tiktok", "instagram", "facebook",
]
drift_min_dwell_s = 300     # 5 minutes
drift_cooldown_s = 600      # 10 minutes
max_age_s = 28800           # 8 hours

[actions]
enabled = true
timer = true
system_info = true
open_app = true
do_math = true

[tools]
# Opt-in tool allowlist. Managed by the /tools picker - phase 1-5 tools
# (read_file, git_log, weather_forecast_week, pomodoro, agent, research, ...)
# are disabled until added here. Defaults above stay on regardless.
enabled_tools = []

[paths]
data_dir = "~/.tokenpal"

[plugins]
extra_packages = []

[server]
# host = "127.0.0.1"       # default: localhost only. Set "0.0.0.0" for LAN access
# port = 8585
# mode = "auto"            # auto (fallback to local), remote (server only), local (skip server)
# auth_backend = "none"    # "none" or "shared_secret"
# api_key = ""
# ollama_url = "http://localhost:11434"

[finetune]
base_model = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
# lora_rank = 16              # auto-tuned by dataset size
# epochs = 3                  # auto-tuned by dataset size
# batch_size = 4
# learning_rate = 0.0002
# quantization = "q4_k_m"    # only for legacy GGUF export
# output_dir = "~/.tokenpal/finetune"

# Remote GPU training - set host/user in config.toml (machine-specific)
# [finetune.remote]
# host = "gpu-box.local"     # SSH hostname or IP
# user = ""                  # SSH user (optional, uses default)
# port = 22                  # SSH port (use 2222 for direct WSL SSH)
# remote_dir = "~/tokenpal-training"
# use_wsl = false            # true for Windows + WSL hosts (not needed with direct WSL SSH)
# gpu_backend = "auto"       # auto, cuda, or rocm

[cloud_llm]
# Opt-in cloud inference for /research synth ONLY. When enabled, the
# synthesis stage of /research is routed through Anthropic's API (Haiku
# 4.5 by default - fast, ~$0.02 per research run). Observations,
# conversation, planner, /ask, and idle-tool rolls NEVER use the cloud -
# those stay local regardless of this setting.
#
# Manage via slash commands (no need to edit this file):
#   /cloud enable <api-key>   - store key at ~/.tokenpal/.secrets.json
#   /cloud disable            - flip off, keep key
#   /cloud forget             - wipe key entirely
#   /cloud model <model-id>   - haiku-4-5, sonnet-4-6, or opus-4-7
#
# enabled = false
# model = "claude-haiku-4-5"
# timeout_s = 30.0
# research_synth = true       # per-site toggle (only site today)

[cloud_search]
# Opt-in cloud-backed search for /research ONLY. When enabled, stage 2+3
# (search + fetch/extract) route through Tavily's API, which returns
# pre-extracted article content — skipping the local DDG + newspaper4k
# chain. Haiku synth still handles stage 4. Observations, conversation,
# planner, /ask, and idle-tool rolls stay local.
#
# Pricing note: Tavily advanced = 2 credits/query. With max_queries=5,
# worst case per /research is 10 credits. Tavily's free tier is 1k
# credits/month (~100 runs worst case, realistically 200+).
#
# Manage via slash commands:
#   /cloud tavily enable <api-key>   - store key at ~/.tokenpal/.secrets.json
#   /cloud tavily disable            - flip off, keep key
#   /cloud tavily forget             - wipe key entirely
#
# enabled = false
# backend = "tavily"
# search_depth = "advanced"   # "basic" = 1 credit/query, "advanced" = 2
# max_results = 6
# timeout_s = 15.0
