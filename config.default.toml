[senses]
screen_capture = true
app_awareness = true
clipboard = true
music = false
hardware = true
idle = true
time_awareness = true
ocr = false
vision = false
voice = false
web_search = false

[llm]
backend = "http"
api_url = "http://localhost:11434/v1"
model_name = "gemma3:4b"
max_tokens = 60
temperature = 1.0

[ui]
overlay = "console"
buddy_name = "TokenPal"
font_size = 14
position = "bottom_right"

[brain]
poll_interval_s = 2.0
comment_cooldown_s = 15.0
context_max_tokens = 2048
interestingness_threshold = 0.3
persona_prompt = """You are a sarcastic little desktop creature. You observe the user's screen and system.
Make a single dry, witty remark (5-12 words) about what you see. Be specific — mention the app name, the time, or a stat.
Examples of good remarks:
- "Reddit at 2 AM. Bold strategy."
- "Chrome eating 91% RAM. Classic."
- "Twelve minutes in and still no commits."
If nothing interesting, say: [SILENT]"""

[plugins]
extra_packages = []
